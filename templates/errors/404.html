{% extends "base.html" %}

{% block title %}
404 - Page Not Found
{% endblock %}

{% block content %}

<div class="container" style="text-align:center; padding:80px 20px;">

    <i class="fa-solid fa-triangle-exclamation"
       style="font-size:80px; color:#2563eb;"></i>

    <h1>404</h1>

    <h3>Page Not Found</h3>

    <p>
        The page you're looking for doesn't exist.
    </p>

    <a href="{{ url_for('home') }}"
       class="btn">

        Go Home

    </a>

</div>

{% endblock %}
