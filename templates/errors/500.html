{% extends "base.html" %}

{% block title %}
500 - Server Error
{% endblock %}

{% block content %}

<div class="container" style="text-align:center; padding:80px 20px;">

    <i class="fa-solid fa-server"
       style="font-size:80px; color:#f59e0b;"></i>

    <h1>500</h1>

    <h3>Something went wrong</h3>

    <p>

        Please try again later.

    </p>

    <a href="{{ url_for('index') }}"
       class="btn">

        Go Home

    </a>

</div>

{% endblock %}
